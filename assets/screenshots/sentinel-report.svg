<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Sentinel">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14532d"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#grid)"/>
  <text x="640" y="290" text-anchor="middle" font-size="120" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">🛡</text>
  <text x="640" y="400" text-anchor="middle" fill="#ffffff" font-size="64" font-weight="800" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" letter-spacing="-1">Sentinel</text>
  <text x="640" y="450" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="22" font-weight="500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">cPanel/WHM security audit toolkit · CVE feed</text>
  <text x="640" y="640" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" letter-spacing="3">SCREENSHOT COMING SOON</text>
